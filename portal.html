<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STUDY MAX FINAL — 학습 포털</title>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles/portal.css" />
</head>
<body>
  <aside class="sidebar box">
    <div class="logo">STUDY MAX FINAL</div>
    <nav class="menu">
      <button class="active" onclick="showDashboard(this)">🏁 대시보드</button>
      <button data-src="korean_hub.html" onclick="showSubject(this,'국어 학습')">📖 국어</button>
      <button data-src="english_hub.html" onclick="showSubject(this,'영어 학습')">📝 영어</button>
      <button data-src="science_hub.html" onclick="showSubject(this,'통합과학 학습')">🧪 통합과학</button>
      <button data-src="society_hub.html" onclick="showSubject(this,'통합사회 학습')">🌍 통합사회</button>
      <button data-src="mega_study.html" onclick="showSubject(this,'정보 학습')">💻 정보</button>
    </nav>
    <div class="home"><a href="./index.html">처음으로</a></div>
  </aside>

  <main class="main">
    <header class="header box">
      <h1 id="title">기말 학습 대시보드</h1>
      <p id="desc">박스 기반 레이아웃으로 섹션을 분리해 깔끔하게 구성했습니다.</p>
    </header>

    <section class="content box">
      <div id="dashPanel" class="panel active">
        <div class="dashboard-grid">
          <article class="card box"><h3>기말 D-DAY (2026-06-29)</h3><div class="v" id="ddayValue">D-0</div></article>
          <article class="card box"><h3>내 목표</h3><div class="v" id="goalValue">목표 설정 전</div></article>
          <article class="card box"><h3>복습 완료율</h3><div class="v">68%</div></article>

          <article class="goal box">
            <h3>개인 목표 설정</h3>
            <div class="goal-form">
              <input id="goalInput" type="text" placeholder="예: 수학 3단원 오답 2회독" />
              <button type="button" id="goalSaveBtn">저장</button>
            </div>
            <p id="goalMsg" class="goal-msg"></p>
          </article>

          <article class="memo box">
            <h3>오늘 메모</h3>
            <textarea placeholder="핵심만 간단히 기록하세요."></textarea>
            <div class="handwrite-tools">
              <button type="button" id="clearCanvasBtn">손글씨 지우기</button>
            </div>
            <canvas id="memoCanvas" aria-label="손글씨 메모 캔버스"></canvas>
          </article>
        </div>
      </div>
      <div id="framePanel" class="panel">
        <iframe id="frame" src="about:blank" title="학습 페이지"></iframe>
      </div>
    </section>
  </main>
  <script src="./scripts/portal.js"></script>
</body>
</html>
