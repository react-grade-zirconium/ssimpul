<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STUDY MAX FINAL — 학습 포털</title>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root{--nav:#0f172a;--bg:#f1f5f9;--panel:#fff;--line:#dbe3ef;--text:#0f172a;--sub:#64748b;--primary:#2563eb}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Pretendard',sans-serif;height:100vh;display:flex;background:var(--bg);color:var(--text)}
    .sidebar{width:220px;background:var(--nav);color:#cbd5e1;display:flex;flex-direction:column}
    .logo{padding:18px 14px;text-align:center;font-weight:800;color:#fff;border-bottom:1px solid rgba(255,255,255,.1)}
    .menu{padding:10px;display:grid;gap:6px}.menu button{border:0;border-radius:8px;padding:10px 12px;text-align:left;background:transparent;color:inherit;cursor:pointer}
    .menu button.active{background:var(--primary);color:#fff;font-weight:700}
    .home{margin-top:auto;padding:10px;border-top:1px solid rgba(255,255,255,.1)}.home a{display:block;text-align:center;text-decoration:none;color:#e2e8f0;border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:10px}
    .main{flex:1;padding:16px;display:grid;grid-template-rows:auto 1fr;gap:12px;min-width:0}
    .header,.content{background:var(--panel);border:1px solid var(--line);border-radius:12px}
    .header{padding:14px 16px}.header h1{font-size:1.15rem}.header p{color:var(--sub);margin-top:4px;font-size:.92rem}
    .content{overflow:hidden}.panel{display:none;height:100%}.panel.active{display:block}
    .dashboard{padding:16px;display:grid;gap:10px;grid-template-columns:repeat(3,1fr)}
    .kpi,.memo{border:1px solid var(--line);border-radius:10px;padding:14px}.kpi h3{font-size:.86rem;color:var(--sub);margin-bottom:8px}.kpi .v{font-size:1.4rem;font-weight:800}
    .memo{grid-column:1/-1}.memo textarea{width:100%;min-height:170px;border:1px solid var(--line);border-radius:8px;padding:10px;font-family:inherit;resize:vertical}
    iframe{width:100%;height:100%;border:none}
    @media (max-width:940px){.dashboard{grid-template-columns:1fr}.sidebar{width:180px}}
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="logo">STUDY MAX FINAL</div>
    <nav class="menu">
      <button class="active" onclick="showDashboard(this)">🏁 대시보드</button>
      <button data-src="korean_hub.html" onclick="showSubject(this,'국어 학습')">📖 국어</button>
      <button data-src="english_hub.html" onclick="showSubject(this,'영어 학습')">📝 영어</button>
      <button data-src="science_hub.html" onclick="showSubject(this,'통합과학 학습')">🧪 통합과학</button>
      <button data-src="society_hub.html" onclick="showSubject(this,'통합사회 학습')">🌍 통합사회</button>
      <button data-src="mega_study.html" onclick="showSubject(this,'정보 학습')">💻 정보</button>
    </nav>
    <div class="home"><a href="./">홈으로</a></div>
  </aside>
  <main class="main">
    <header class="header"><h1 id="title">기말 학습 대시보드</h1><p id="desc">요소를 최소화한 깔끔한 화면입니다.</p></header>
    <section class="content">
      <div id="dashPanel" class="panel active"><div class="dashboard">
        <article class="kpi"><h3>기말 D-DAY</h3><div class="v">D-21</div></article>
        <article class="kpi"><h3>오늘 목표</h3><div class="v">3단원</div></article>
        <article class="kpi"><h3>복습 완료율</h3><div class="v">68%</div></article>
        <article class="memo"><h3>오늘 메모</h3><textarea placeholder="핵심만 간단히 기록하세요."></textarea></article>
      </div></div>
      <div id="framePanel" class="panel"><iframe id="frame" src="about:blank" title="학습 페이지"></iframe></div>
    </section>
  </main>
<script>
  const title=document.getElementById('title'),desc=document.getElementById('desc');
  const dashPanel=document.getElementById('dashPanel'),framePanel=document.getElementById('framePanel'),frame=document.getElementById('frame');
  function setActive(btn){document.querySelectorAll('.menu button').forEach(b=>b.classList.remove('active'));btn.classList.add('active')}
  function showDashboard(btn){setActive(btn);dashPanel.classList.add('active');framePanel.classList.remove('active');title.textContent='기말 학습 대시보드';desc.textContent='요소를 최소화한 깔끔한 화면입니다.'}
  function showSubject(btn,heading){setActive(btn);dashPanel.classList.remove('active');framePanel.classList.add('active');frame.src=btn.dataset.src;title.textContent=heading;desc.textContent='선택 과목만 집중해서 볼 수 있습니다.'}
</script>
</body>
</html>
