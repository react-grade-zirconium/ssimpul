name: CI

on:
  push:
    branches:
      - main
      - work
      - 'codex/**'
  pull_request:
    branches:
      - main
      - work
  workflow_dispatch:

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Validate frontend script syntax (index)
        run: node --check scripts/index.js

      - name: Validate frontend script syntax (portal)
        run: node --check scripts/portal.js

      - name: Validate server syntax
        run: node --check server.mjs
