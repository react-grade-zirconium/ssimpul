<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STUDY MAX FINAL</title>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg1: #020617;
      --bg2: #0f172a;
      --primary: #60a5fa;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Pretendard', sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 20%, rgba(96,165,250,0.22), transparent 38%),
        radial-gradient(circle at 80% 0%, rgba(56,189,248,0.12), transparent 35%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      color: var(--text);
      padding: 24px;
    }

    .hero {
      width: min(900px, 100%);
      border: 1px solid rgba(148,163,184,0.25);
      border-radius: 22px;
      background: rgba(15, 23, 42, 0.66);
      backdrop-filter: blur(6px);
      padding: 44px 36px;
      box-shadow: 0 18px 56px rgba(0,0,0,0.35);
    }

    .headline { margin-bottom: 14px; }
    .line {
      font-size: clamp(1.8rem, 5vw, 3.1rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.15;
      min-height: 1.2em;
      white-space: nowrap;
      overflow: hidden;
      border-right: 2px solid rgba(226,232,240,0.7);
      width: 0;
      opacity: 0;
    }

    .line1 { color: #dbeafe; }
    .line2 { color: #bfdbfe; margin-top: 6px; }

    .line.show {
      opacity: 1;
      animation: typing 1.2s steps(18, end) forwards, caret 0.8s step-end infinite;
    }

    .line.freeze {
      border-right-color: transparent;
      animation: none;
      opacity: 1;
      width: var(--final-width);
    }

    @keyframes typing {
      from { width: 0; }
      to { width: var(--final-width); }
    }

    @keyframes caret {
      0%, 100% { border-right-color: rgba(226,232,240,0.7); }
      50% { border-right-color: transparent; }
    }

    .sub {
      margin-top: 18px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 1.02rem;
    }

    .actions { margin-top: 28px; display: flex; gap: 10px; flex-wrap: wrap; }
    .btn {
      text-decoration: none;
      font-weight: 700;
      border-radius: 12px;
      padding: 12px 18px;
      transition: transform .2s;
    }
    .btn-main { background: linear-gradient(90deg, #3b82f6, #06b6d4); color: #fff; }
    .btn-ghost { border: 1px solid rgba(148,163,184,.35); color: #cbd5e1; }
    .btn:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
  <section class="hero">
    <div class="headline">
      <h1 id="line1" class="line line1" aria-label="첫째 줄"></h1>
      <h2 id="line2" class="line line2" aria-label="둘째 줄"></h2>
    </div>

    <p class="sub">기말 대비 자료를 한 곳에서 정리하고, 과목별 페이지로 바로 이동할 수 있는 스터디 포털입니다.</p>

    <div class="actions">
      <a href="./portal.html" class="btn btn-main">학습 시작하기</a>
      <a href="./README.md" class="btn btn-ghost">README 보기</a>
    </div>
  </section>

  <script>
    const firstStart = '심규원, 최시원의';
    const firstFinal = '심';
    const secondStart = '풀서비스 스터디';
    const secondFinal = '풀 스터디';

    const line1 = document.getElementById('line1');
    const line2 = document.getElementById('line2');

    function setTyping(el, text) {
      el.textContent = text;
      el.style.setProperty('--final-width', `${text.length}ch`);
      el.classList.remove('freeze');
      void el.offsetWidth;
      el.classList.add('show');
    }

    function freezeText(el, text) {
      el.classList.remove('show');
      el.textContent = text;
      el.style.setProperty('--final-width', `${text.length}ch`);
      el.classList.add('freeze');
    }

    setTyping(line1, firstStart);

    setTimeout(() => {
      freezeText(line1, firstFinal);
      setTyping(line2, secondStart);
    }, 1700);

    setTimeout(() => {
      freezeText(line2, secondFinal);
    }, 3600);
  </script>
</body>
</html>
