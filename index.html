<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIMPUL STUDY</title>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles/index.css" />
</head>
<body>
  <main class="page-shell">
    <section class="hero box">
      <div class="badge">SIMPUL STUDY PORTAL</div>
      <div class="line-wrap" id="lineWrap">
        <h1 id="line1" class="line"></h1>
        <h2 id="line2" class="line"></h2>
      </div>
      <h2 id="finalLine" class="final-line"></h2>
      <p class="tagline">학습 코드를 입력하고 바로 시작하세요.</p>

      <div class="code-box">
        <label for="classInput">학급 정보</label>
        <div class="code-row">
          <input id="classInput" type="number" min="1" max="8" placeholder="반 (1~8)" />
          <input id="numberInput" type="number" min="1" max="35" placeholder="번호 (1~35)" />
          <button id="codeSaveBtn" type="button" class="btn sub">코드 저장</button>
        </div>
        <p id="codeMsg" class="code-msg"></p>
      </div>

      <div class="actions">
        <a id="startStudyBtn" class="btn main" href="./portal.html">학습 시작</a>
        <a class="btn sub" href="./README.md">README</a>
      </div>
    </section>

    <section class="hero-enhance box" aria-label="빠른 안내">
      <div class="enhance-item"><strong>STEP 1.</strong> 개인 코드를 등록합니다.</div>
      <div class="enhance-item"><strong>STEP 2.</strong> 기기 인증 후 학습을 시작합니다.</div>
      <div class="enhance-item"><strong>TIP.</strong> 목표를 설정하고 과목별로 집중 학습하세요.</div>
    </section>
  </main>
  <script src="./scripts/index.js"></script>
</body>
</html>
