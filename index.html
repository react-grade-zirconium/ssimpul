<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STUDY MAX FINAL</title>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0b1220;
      --panel: #111a2b;
      --line: #2b3a55;
      --text: #e6edf7;
      --muted: #97a6bf;
      --accent: #60a5fa;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: 'Pretendard', sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .hero {
      width: min(760px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 40px 30px;
    }
    .line {
      font-size: clamp(1.9rem, 5vw, 3rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      width: 0;
      border-right: 2px solid var(--text);
      opacity: 0;
    }
    .line + .line { margin-top: 8px; }
    .line.show { opacity: 1; animation: typing 1.1s steps(18, end) forwards, caret .7s step-end infinite; }
    .line.freeze { opacity: 1; width: var(--final-width); border-right-color: transparent; animation: none; }
    @keyframes typing { from { width: 0; } to { width: var(--final-width); } }
    @keyframes caret { 50% { border-right-color: transparent; } }

    .desc { margin-top: 16px; color: var(--muted); font-size: .98rem; line-height: 1.65; }
    .actions { margin-top: 24px; display: flex; gap: 10px; }
    .btn { text-decoration: none; border-radius: 10px; padding: 11px 16px; font-weight: 700; }
    .btn.main { background: var(--accent); color: white; }
    .btn.sub { border: 1px solid var(--line); color: #c6d4ea; }
  </style>
</head>
<body>
  <section class="hero">
    <h1 id="line1" class="line"></h1>
    <h2 id="line2" class="line"></h2>
    <p class="desc">필요한 것만 남긴 시작 화면입니다. 아래 버튼으로 바로 학습을 시작하세요.</p>
    <div class="actions">
      <a class="btn main" href="./portal.html">학습 시작</a>
      <a class="btn sub" href="./README.md">README</a>
    </div>
  </section>

  <script>
    const line1 = document.getElementById('line1');
    const line2 = document.getElementById('line2');

    const firstStart = '심규원, 최시원의';
    const firstFinal = '심';
    const secondStart = '풀서비스 스터디';
    const secondFinal = '풀 스터디';

    function typeText(el, text) {
      el.textContent = text;
      el.style.setProperty('--final-width', `${text.length}ch`);
      el.classList.remove('freeze');
      void el.offsetWidth;
      el.classList.add('show');
    }

    function pinText(el, text) {
      el.classList.remove('show');
      el.textContent = text;
      el.style.setProperty('--final-width', `${text.length}ch`);
      el.classList.add('freeze');
    }

    typeText(line1, firstStart);
    setTimeout(() => { pinText(line1, firstFinal); typeText(line2, secondStart); }, 1600);
    setTimeout(() => { pinText(line2, secondFinal); }, 3300);
  </script>
</body>
</html>
